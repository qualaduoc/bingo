<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Vườn Thú Song Ngữ (Google AI Voice)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #2c3e50;
            background-image: url('https://www.transparenttextures.com/patterns/clean-textile.png');
            background-size: cover;
        }

        /* Styles kept consistent */
        .bingo-ball {
            background: radial-gradient(circle at 30% 30%, #e0f2f7, #b2ebf2 15%, #80deea 30%, #4dd0e1 100%);
            box-shadow: 0 5px 10px -2px rgba(0, 0, 0, 0.4), inset 0 -3px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #2c3e50;
        }
        
        .bingo-ball.active {
            transform: scale(1.1);
            border: 4px solid #fbc02d;
        }

        .bingo-ball-main {
            background: radial-gradient(circle at 30% 30%, #fffde7, #fff9c4 20%, #ffeb3b 50%, #fbc02d 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3), 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid rgba(255, 255, 255, 0.4);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .cell {
            transition: all 0.2s;
            cursor: pointer;
            background-color: #f7fafc;
            border-color: #e2e8f0;
        }
        
        .cell:active {
            transform: scale(0.95);
        }

        .cell.marked {
            background-color: #38b2ac;
            border-color: #2c7a7b;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .cell.marked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cell.free {
            background-color: #f6ad55;
            color: white;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-color: #dd6b20;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2c3e50; }
        ::-webkit-scrollbar-thumb { background: #55708a; border-radius: 4px; }

        .animal-image {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            padding: 4px; 
            border-radius: 6px;
        }
        
        /* Playing indicator */
        .playing-audio .fa-volume-up {
            animation: sound-wave 1s infinite;
            color: #10b981;
        }
        @keyframes sound-wave {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center py-6 px-2 sm:px-4">

    <!-- Header -->
    <header class="text-center mb-6 relative z-10">
        <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-orange-400 to-red-500 drop-shadow-lg tracking-wider">
            BINGO SONG NGỮ
        </h1>
        <p class="text-gray-300 text-sm md:text-base mt-1">Giọng đọc AI Google chuẩn xác</p>
    </header>

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Column: The Caller Machine -->
        <div class="lg:col-span-5 flex flex-col gap-4">
            <!-- Main Display -->
            <div class="bg-gray-800 rounded-2xl p-6 shadow-xl border border-gray-700 flex flex-col items-center justify-center relative overflow-hidden min-h-[250px]">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 via-green-400 to-lime-400"></div>
                
                <!-- Current Animal Display -->
                <div id="current-ball-container" class="relative z-10 mb-4">
                    <div id="current-ball" class="bingo-ball-main w-40 h-40 rounded-full flex items-center justify-center text-6xl font-black text-white hidden p-2">
                        <img id="current-animal-img" src="" alt="Current Animal" class="w-full h-full object-contain rounded-full">
                    </div>
                    <div id="start-placeholder" class="text-gray-500 text-xl font-bold animate-pulse">
                        Nhấn "Bốc Số" để bắt đầu
                    </div>
                </div>

                <!-- Reading Status -->
                <div id="reading-status" class="h-6 text-yellow-400 font-bold text-sm mb-2 transition-opacity opacity-0">
                    <i class="fas fa-volume-up mr-2"></i> <span id="reading-text">Đang đọc...</span>
                </div>

                <!-- Last 5 Animals -->
                <div class="flex gap-2 h-12 items-center justify-center w-full">
                    <span class="text-xs text-gray-500 uppercase font-bold mr-2">Mới ra:</span>
                    <div id="history-container" class="flex gap-2">
                        <!-- JS will populate this -->
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="drawNumber()" id="btn-draw" class="bg-gradient-to-b from-teal-400 to-teal-600 hover:from-teal-500 hover:to-teal-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition hover:-translate-y-1 active:translate-y-0 border-b-4 border-teal-800 text-lg">
                    <i class="fas fa-paw mr-2"></i> Bốc Số
                </button>
                
                <button onclick="toggleAuto()" id="btn-auto" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition hover:-translate-y-1 active:translate-y-0 border-b-4 border-gray-900">
                    <i class="fas fa-play mr-2"></i> Tự Động
                </button>

                <button onclick="resetGame()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition border-b-4 border-red-800">
                    <i class="fas fa-redo mr-2"></i> Chơi Lại
                </button>

                <button onclick="generatePlayerCard()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition border-b-4 border-blue-800">
                    <i class="fas fa-ticket-alt mr-2"></i> Đổi Thẻ
                </button>
            </div>
            
            <div class="flex items-center justify-center gap-3 mt-2 text-sm text-gray-400">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="sound-toggle" class="form-checkbox h-4 w-4 text-teal-600 rounded bg-gray-700 border-gray-600" checked>
                    <span class="ml-2">Đọc Anh - Việt</span>
                </label>
                <span>•</span>
                <span class="text-yellow-400 font-bold">Tốc độ: 6s</span>
            </div>
        </div>

        <!-- Middle Column: The Board Tracker -->
        <div class="lg:col-span-3 bg-gray-800 rounded-2xl p-4 shadow-xl border border-gray-700">
            <h3 class="text-center text-gray-400 font-bold mb-3 text-sm uppercase tracking-wider">Bảng Các Con Vật Đã Gọi</h3>
            <div class="grid grid-cols-5 gap-1.5 text-xs sm:text-sm" id="master-board">
                <!-- JS Generates 1-40 here -->
            </div>
        </div>

        <!-- Right Column: Player Card -->
        <div class="lg:col-span-4">
            <div class="bg-white rounded-2xl p-1 shadow-2xl transform rotate-1 transition hover:rotate-0 duration-300">
                <div class="bg-emerald-600 rounded-t-xl p-3 text-center">
                    <div class="grid grid-cols-5 text-center font-black text-2xl text-yellow-300 drop-shadow-md">
                        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
                    </div>
                </div>
                <div class="bg-gray-100 p-3 rounded-b-xl">
                    <div id="player-card" class="grid grid-cols-5 gap-2">
                        <!-- JS Generates Card Here -->
                    </div>
                </div>
            </div>
            <p class="text-center text-gray-500 mt-4 text-sm italic">
                Bấm vào ô con vật trên thẻ khi nghe thấy tên.
            </p>
        </div>

    </div>

    <!-- Modal Winner -->
    <div id="winner-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white text-gray-900 p-8 rounded-3xl shadow-2xl text-center max-w-sm mx-4 animate-bounce-in transform scale-100 border-4 border-yellow-400">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-4xl font-black text-emerald-600 mb-2">BINGO!</h2>
            <p class="text-lg text-gray-600 mb-6">Chúc mừng! Bạn đã chiến thắng!</p>
            <button onclick="closeModal()" class="bg-yellow-400 hover:bg-yellow-500 text-emerald-800 font-black py-3 px-8 rounded-full shadow-lg text-lg transition hover:scale-105">
                Tuyệt Vời!
            </button>
        </div>
    </div>

    <script>
        // Game State
        const TOTAL_NUMBERS = 40;
        
        // DANH SÁCH TÊN CẬP NHẬT CHÍNH XÁC THEO YÊU CẦU CỦA THẦY
        // Em đã bổ sung số 40 là "Mèo" để đủ danh sách.
        const ANIMAL_NAMES_VI = [
            "Sư tử", "Khỉ", "Thỏ", "Thỏ", "Hươu cao cổ", 
            "Rùa", "Ong mật", "Khủng long", "Cánh cụt", "Ốc sên", 
            "Cappybara", "Sao biển", "Voi", "Bọ rùa", "Nhím", 
            "Cá ngựa", "Bạch tuộc", "Cá voi", "Vẹt", "Cappybara", 
            "Hồng hạc", "Tắc kè", "Gấu mèo", "Hà mã", "Hổ", 
            "Ốc sên", "Bò rừng", "Dê", "Dơi", "Quái vật", 
            "Nhện", "Sứa", "Bạch tuộc", "Nhím", "Bướm", 
            "Ngựa pony", "Khủng long", "Chó", "Kiến", "Mèo"
        ];
        
        const ANIMAL_NAMES_EN = [
            "Lion", "Monkey", "Rabbit", "Rabbit", "Giraffe",
            "Turtle", "Honey Bee", "Dinosaur", "Penguin", "Snail",
            "Capybara", "Starfish", "Elephant", "Ladybug", "Hedgehog",
            "Seahorse", "Octopus", "Whale", "Parrot", "Capybara",
            "Flamingo", "Gecko", "Raccoon", "Hippo", "Tiger",
            "Snail", "Bison", "Goat", "Bat", "Monster",
            "Spider", "Jellyfish", "Octopus", "Hedgehog", "Butterfly",
            "Pony", "Dinosaur", "Dog", "Ant", "Cat"
        ];

        let drawnNumbers = [];
        let remainingNumbers = Array.from({length: TOTAL_NUMBERS}, (_, i) => i + 1);
        let playerCardData = [];
        let markedCells = new Set();
        let autoInterval = null;
        let isAutoPlaying = false;
        
        // Audio handling variables
        let currentAudio = null;
        let audioQueue = []; 

        // DOM Elements
        const currentBallEl = document.getElementById('current-ball');
        const currentAnimalImgEl = document.getElementById('current-animal-img');
        const startPlaceholder = document.getElementById('start-placeholder');
        const historyContainer = document.getElementById('history-container');
        const masterBoard = document.getElementById('master-board');
        const playerCardEl = document.getElementById('player-card');
        const btnAuto = document.getElementById('btn-auto');
        const winnerModal = document.getElementById('winner-modal');
        const soundToggle = document.getElementById('sound-toggle');
        const readingStatus = document.getElementById('reading-status');
        const readingText = document.getElementById('reading-text');

        // --- Helper Function for Image URLs ---
        function getAnimalImageUrl(id) {
            return `https://dangkyhoc.com/download/40-con-vat/${id}.png`;
        }

        // --- Initialization ---
        function initGame() {
            createMasterBoard();
            generatePlayerCard();
        }

        function resetGame() {
            stopAuto();
            stopAudio(); // Stop any playing sound immediately

            drawnNumbers = [];
            remainingNumbers = Array.from({length: TOTAL_NUMBERS}, (_, i) => i + 1);
            markedCells = new Set();
            markedCells.add(12); // Free space
            
            currentBallEl.classList.add('hidden');
            currentAnimalImgEl.src = '';
            startPlaceholder.classList.remove('hidden');
            historyContainer.innerHTML = '';
            
            document.querySelectorAll('.master-cell').forEach(cell => {
                cell.classList.remove('bg-emerald-500', 'text-white', 'scale-110', 'shadow-lg', 'border-emerald-600');
                cell.classList.add('bg-gray-700', 'text-gray-400', 'border-gray-600');
            });

            renderPlayerCard();
        }

        // --- Master Board Logic ---
        function createMasterBoard() {
            masterBoard.innerHTML = '';
            for (let i = 1; i <= TOTAL_NUMBERS; i++) {
                const cell = document.createElement('div');
                cell.id = `master-${i}`;
                cell.className = 'master-cell h-10 w-full flex items-center justify-center rounded bg-gray-700 border border-gray-600 text-gray-400 font-semibold text-xs transition-all duration-300 relative overflow-hidden group';
                
                const img = document.createElement('img');
                img.src = getAnimalImageUrl(i);
                img.alt = ANIMAL_NAMES_VI[i-1];
                img.className = 'w-full h-full object-contain p-1 transition-transform group-hover:scale-105';
                cell.appendChild(img);

                const label = document.createElement('div');
                label.className = 'absolute bottom-0 left-0 right-0 bg-gray-800 bg-opacity-70 text-white text-center text-[0.6rem] py-0.5 opacity-0 group-hover:opacity-100 transition-opacity';
                label.textContent = ANIMAL_NAMES_VI[i-1];
                cell.appendChild(label);
                
                masterBoard.appendChild(cell);
            }
        }

        // --- Player Card Logic ---
        function generatePlayerCard() {
            markedCells = new Set();
            
            let availableAnimals = Array.from({length: TOTAL_NUMBERS}, (_, i) => i + 1);
            let shuffledAnimals = availableAnimals.sort(() => 0.5 - Math.random());
            let cardAnimals = shuffledAnimals.slice(0, 24); 

            // Insert 'FREE' space at index 12
            cardAnimals.splice(12, 0, 'FREE'); 
            playerCardData = cardAnimals;
            markedCells.add(12);

            renderPlayerCard();
        }

        function renderPlayerCard() {
            playerCardEl.innerHTML = '';
            playerCardData.forEach((val, index) => {
                const cell = document.createElement('div');
                let className = 'cell h-16 sm:h-20 w-full rounded-lg border-2 flex items-center justify-center font-bold shadow-sm relative overflow-hidden ';
                
                if (val === 'FREE') {
                    className += 'free border-amber-500 text-sm';
                    cell.innerHTML = '<i class="fas fa-star text-3xl text-white"></i><br>FREE';
                } else {
                    const img = document.createElement('img');
                    img.src = getAnimalImageUrl(val);
                    img.alt = ANIMAL_NAMES_VI[val-1];
                    img.className = 'animal-image';
                    cell.appendChild(img);

                    const label = document.createElement('div');
                    label.className = 'absolute bottom-0 left-0 right-0 bg-gray-800 bg-opacity-70 text-white text-center text-xs py-0.5 opacity-0 transition-opacity group-hover:opacity-100';
                    label.textContent = ANIMAL_NAMES_VI[val-1];
                    cell.appendChild(label);

                    className += 'bg-white text-gray-800 border-gray-200 hover:bg-gray-50 group';
                }

                if (markedCells.has(index)) {
                    className += ' marked';
                }

                cell.className = className;
                cell.onclick = () => toggleMark(index, val);
                playerCardEl.appendChild(cell);
            });
        }

        function toggleMark(index, val) {
            if (val === 'FREE') return;
            
            if (!drawnNumbers.includes(val)) {
                const cell = playerCardEl.children[index];
                cell.classList.add('bg-red-200', 'ring-2', 'ring-red-500');
                setTimeout(() => cell.classList.remove('bg-red-200', 'ring-2', 'ring-red-500'), 400);
                return; 
            }

            if (markedCells.has(index)) {
                markedCells.delete(index);
            } else {
                markedCells.add(index);
            }
            renderPlayerCard();
            checkWin();
        }

        // --- Game Logic ---
        function drawNumber() {
            if (remainingNumbers.length === 0) {
                showInfoModal("Thông báo", "Đã hết con vật để bốc!");
                stopAuto();
                return;
            }

            const randomIndex = Math.floor(Math.random() * remainingNumbers.length);
            const animalId = remainingNumbers[randomIndex];
            
            remainingNumbers.splice(randomIndex, 1);
            drawnNumbers.unshift(animalId);

            animateBall(animalId);
            updateMasterBoard(animalId);
            updateHistory();
            
            // Trigger the improved AI Voice
            playAnimalSoundSequence(animalId);
            
            autoMarkPlayerCard(animalId);
        }

        function autoMarkPlayerCard(drawnAnimalId) {
            playerCardData.forEach((cardAnimalId, index) => {
                if (cardAnimalId === drawnAnimalId && !markedCells.has(index)) {
                    const cell = playerCardEl.children[index];
                    cell.classList.add('bg-yellow-200', 'ring-4', 'ring-yellow-500', 'animate-pulse');
                    setTimeout(() => {
                        cell.classList.remove('bg-yellow-200', 'ring-4', 'ring-yellow-500', 'animate-pulse');
                        markedCells.add(index);
                        renderPlayerCard();
                        checkWin();
                    }, 800);
                }
            });
        }

        function updateMasterBoard(num) {
            const cell = document.getElementById(`master-${num}`);
            if (cell) {
                cell.classList.remove('bg-gray-700', 'text-gray-400', 'border-gray-600');
                cell.classList.add('bg-emerald-500', 'text-white', 'scale-110', 'shadow-lg', 'border-emerald-600', 'z-10');
            }
        }

        function updateHistory() {
            historyContainer.innerHTML = '';
            const history = drawnNumbers.slice(1, 6);
            history.forEach(animalId => {
                const ball = document.createElement('div');
                ball.className = 'bingo-ball w-10 h-10 rounded-full flex items-center justify-center text-xs font-bold text-gray-800 border border-gray-300 p-1';
                const img = document.createElement('img');
                img.src = getAnimalImageUrl(animalId);
                img.alt = ANIMAL_NAMES_VI[animalId-1];
                img.className = 'w-full h-full object-contain rounded-full';
                ball.appendChild(img);
                historyContainer.appendChild(ball);
            });
        }

        function animateBall(animalId) {
            startPlaceholder.classList.add('hidden');
            currentBallEl.classList.remove('hidden');
            
            currentAnimalImgEl.src = getAnimalImageUrl(animalId);
            currentAnimalImgEl.alt = ANIMAL_NAMES_VI[animalId-1];

            currentBallEl.classList.remove('bingo-ball-main');
            void currentBallEl.offsetWidth;
            currentBallEl.classList.add('bingo-ball-main');
        }

        function toggleAuto() {
            if (isAutoPlaying) {
                stopAuto();
            } else {
                startAuto();
            }
        }

        function startAuto() {
            isAutoPlaying = true;
            document.getElementById('btn-draw').disabled = true;
            btnAuto.innerHTML = '<i class="fas fa-stop mr-2"></i> Dừng lại';
            btnAuto.classList.remove('bg-gray-700');
            btnAuto.classList.add('bg-red-600');
            
            drawNumber(); 
            // INCREASED INTERVAL TO 6000ms (6 seconds) to ensure audio finishes
            autoInterval = setInterval(drawNumber, 6000); 
        }

        function stopAuto() {
            isAutoPlaying = false;
            document.getElementById('btn-draw').disabled = false;
            clearInterval(autoInterval);
            btnAuto.innerHTML = '<i class="fas fa-play mr-2"></i> Tự Động';
            btnAuto.classList.add('bg-gray-700');
            btnAuto.classList.remove('bg-red-600');
        }

        // =========================================================
        // NEW AUDIO ENGINE: USING GOOGLE TRANSLATE TTS (AI VOICE)
        // =========================================================
        
        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            readingStatus.style.opacity = '0';
            readingStatus.classList.remove('playing-audio');
        }

        async function playAnimalSoundSequence(animalId) {
            if (!soundToggle.checked) return;
            
            stopAudio(); // Clear previous sound
            
            const enName = ANIMAL_NAMES_EN[animalId - 1];
            const viName = ANIMAL_NAMES_VI[animalId - 1];

            // Visual Feedback
            readingStatus.style.opacity = '1';
            readingStatus.classList.add('playing-audio');
            
            try {
                // 1. Play English
                readingText.textContent = `Đang đọc: ${enName}`;
                await playGoogleTTS(enName, 'en');

                // 2. Wait 2 seconds
                readingText.textContent = "...";
                readingStatus.classList.remove('playing-audio'); // Stop wave animation during pause
                await new Promise(r => setTimeout(r, 2000));
                readingStatus.classList.add('playing-audio'); // Resume wave

                // 3. Play Vietnamese
                readingText.textContent = `Đang đọc: ${viName}`;
                await playGoogleTTS(viName, 'vi');

            } catch (error) {
                console.error("Audio playback failed", error);
                // Fallback to browser synthesis if network fails
                fallbackSynthesis(enName, viName);
            } finally {
                readingStatus.style.opacity = '0';
                readingStatus.classList.remove('playing-audio');
            }
        }

        function playGoogleTTS(text, lang) {
            return new Promise((resolve, reject) => {
                // Google Translate TTS Endpoint (Unofficial but reliable for frontend)
                // client=tw-ob is key here for open access
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${lang}&client=tw-ob&q=${encodeURIComponent(text)}`;
                
                currentAudio = new Audio(url);
                
                currentAudio.onended = () => {
                    resolve();
                };
                
                currentAudio.onerror = (e) => {
                    reject(e);
                };
                
                currentAudio.play().catch(e => reject(e));
            });
        }

        function fallbackSynthesis(en, vi) {
            // Improved Fallback: Force find a Vietnamese voice if possible
            window.speechSynthesis.cancel();
            const uEn = new SpeechSynthesisUtterance(en);
            uEn.lang = 'en-US';
            
            const uVi = new SpeechSynthesisUtterance(vi);
            uVi.lang = 'vi-VN';
            
            // Try to find a Google/Microsoft Vietnamese voice
            const voices = window.speechSynthesis.getVoices();
            const viVoice = voices.find(v => v.lang.includes('vi') || v.name.includes('Viet'));
            if (viVoice) uVi.voice = viVoice;

            uEn.onend = () => {
                setTimeout(() => window.speechSynthesis.speak(uVi), 2000);
            };
            window.speechSynthesis.speak(uEn);
        }
        
        // Pre-load voices for fallback
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }

        // --- Win Checking (5x5) ---
        function checkWin() {
            const size = 5;
            const wins = [];

            // Rows
            for (let i = 0; i < size; i++) {
                const row = [];
                for (let j = 0; j < size; j++) { row.push(i * size + j); }
                wins.push(row);
            }
            // Cols
            for (let j = 0; j < size; j++) {
                const col = [];
                for (let i = 0; i < size; i++) { col.push(i * size + j); }
                wins.push(col);
            }
            // Diagonals
            const diag1 = [], diag2 = [];
            for (let i = 0; i < size; i++) {
                diag1.push(i * size + i);
                diag2.push(i * size + (size - 1 - i));
            }
            wins.push(diag1);
            wins.push(diag2);

            for (let combo of wins) {
                if (combo.every(index => markedCells.has(index))) {
                    doWin();
                    return;
                }
            }
        }

        function doWin() {
            stopAuto();
            stopAudio();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            // Play Win Sound via Google TTS
            playGoogleTTS("Chúc mừng bạn đã chiến thắng Bingo!", "vi");
            
            winnerModal.classList.remove('hidden');
        }

        function closeModal() {
            winnerModal.classList.add('hidden');
            resetGame();
        }
        
        function showInfoModal(title, message) {
            const existingModal = document.getElementById('info-modal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'info-modal';
            modal.className = 'fixed inset-0 bg-black/80 z-50 flex items-center justify-center backdrop-blur-sm';
            
            modal.innerHTML = `
                <div class="bg-white text-gray-900 p-6 rounded-2xl shadow-2xl text-center max-w-xs mx-4 transform scale-100 border-4 border-blue-400">
                    <h2 class="text-2xl font-black text-blue-600 mb-3">${title}</h2>
                    <p class="text-md text-gray-600 mb-4">${message}</p>
                    <button onclick="document.getElementById('info-modal').remove()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full shadow transition">
                        Đã hiểu
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        initGame();

    </script>
</body>
</html>
